<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker ranges</title>
</head>
<body>
    <h1> Poker ranges </h1>

    <table>
        <thead>
            <tr>
                <th>Position</th>
                <th>Hand</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="range : ${ranges}"
            th:class="${range.action}">
                <td th:text="${range.position}"></td>
                <td th:text="${range.hand}"></td>
                <td th:text="${range.action}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
