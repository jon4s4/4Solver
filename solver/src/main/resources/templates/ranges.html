<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Poker Ranges</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }
        .raise { background-color: #f44336; color: white; }
        .call { background-color: #4CAF50; color: white; }
        .fold { background-color: #2196F3; color: white; }
    </style>
</head>
<body>
<h2 style="text-align: center;">Poker Ranges</h2>
<table>
    <thead>
    <tr>
        <th>Position</th>
        <th>Hand</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="range : ${ranges}"
        th:class="${range.action}">
        <td th:text="${range.position}"></td>
        <td th:text="${range.hand}"></td>
        <td th:text="${range.action}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
